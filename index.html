<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cruzadinha Bio A</title>
  <script type="text/javascript" src="https://me.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=bUKdxrPYqn2sXBxzGA9BNxLVoPxUseHbART4AqsMvQiET6PZO_rYYJB0rh19cOGaB1ZhIkl_9D8RFNFknS5EhGr0AqFNanknGEJBc9g9ymx_7kynCKH8bhvldES_0qyUI0XRHUxxm2YbBTwHLRJpeRKL65XB-MQ4mv-UtLLxFZT75UqxQP1-vTA1NHEnE9xGQQQi5wQEPccvEEDJNwQEbgdw__w6xP-DuH7p3eqKMB_Pi_c4jiGl8FqsASC02B5GXObOeb2Q-M4T7aq9e2OuLg" charset="UTF-8"></script><style>
    :root {
      --bg: #edf6f1;
      --card: #ffffff;
      --text: #243746;
      --muted: #64748b;
      --primary: #1f8a5b;
      --primary-dark: #146a45;
      --accent: #2d9cdb;
      --warning: #f39c12;
      --danger: #e74c3c;
      --soft: #dff4ea;
      --word: #dcefff;
      --cell: #ffd54f;
      --cell-size: 42px;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.12);
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #eff8f3 0%, #f8fbfa 100%);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 28px;
    }

    .app {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      padding: 12px;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 10px;
      align-items: center;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(8px);
      border-radius: 0 0 16px 16px;
      box-shadow: var(--shadow);
      padding: 12px;
      margin-bottom: 14px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 1.02rem;
      line-height: 1.15;
    }

    .title-wrap p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.83rem;
    }

    .timer-box {
      text-align: center;
      min-width: 92px;
    }

    .timer-label {
      display: block;
      font-size: 0.74rem;
      color: var(--muted);
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    #timer {
      font-size: 1.45rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: .18s ease;
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--accent); color: white; }
    .btn-secondary:hover { filter: brightness(0.93); }
    .btn-warning { background: var(--warning); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-light { background: #eef2f7; color: var(--text); }

    .student-card,
    .clue-card,
    .support-card,
    .grid-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .student-card {
      padding: 14px;
      margin-bottom: 14px;
    }

    .student-grid {
      display: grid;
      grid-template-columns: 1fr 138px;
      gap: 10px;
      margin-top: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 0.84rem;
      font-weight: 700;
    }

    .field input,
    .field select {
      min-height: 42px;
      border-radius: 10px;
      border: 1px solid #cfd8e3;
      padding: 10px 12px;
      font-size: 0.96rem;
      background: #fff;
    }

    .field small {
      color: var(--muted);
      font-size: 0.76rem;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: start;
    }

    .clue-card {
      padding: 14px;
      min-height: 112px;
      border-left: 6px solid var(--accent);
    }

    .clue-card h2 {
      margin: 0 0 6px;
      font-size: 1rem;
    }

    .clue-card p {
      margin: 0;
      font-size: 1.02rem;
      line-height: 1.45;
    }

    .meta-row {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.84rem;
      flex-wrap: wrap;
    }

    .support-card {
      padding: 14px;
    }

    .support-card h3 {
      margin: 0 0 8px;
      font-size: 0.96rem;
    }

    .support-card ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.88rem;
    }

    .grid-card {
      margin-top: 12px;
      padding: 12px;
    }

    .grid-wrapper {
      overflow: auto;
      background: #1f2937;
      border-radius: 12px;
      padding: 10px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
      display: flex;
      justify-content: center;
    }

    .crossword-grid {
      display: grid;
      gap: 1px;
      width: max-content;
      margin: 0 auto;
      background: #1f2937;
    }

    .cell-container {
      position: relative;
      width: var(--cell-size);
      height: var(--cell-size);
    }

    .cell-input {
      width: 100%;
      height: 100%;
      border: none;
      text-transform: uppercase;
      text-align: center;
      font-size: 1.02rem;
      font-weight: 800;
      background: #fff;
      color: var(--text);
      outline: none;
      caret-color: var(--primary);
    }

    .cell-input:focus {
      box-shadow: inset 0 0 0 3px rgba(31,138,91,.35);
    }

    .cell-input.black {
      background: #101827;
      pointer-events: none;
    }

    .cell-input.highlight-word { background: var(--word); }
    .cell-input.highlight-cell { background: var(--cell); }

    .cell-number {
      position: absolute;
      top: 2px;
      left: 3px;
      font-size: 0.54rem;
      font-weight: 800;
      color: #0f172a;
      z-index: 2;
      pointer-events: none;
    }

    details.clue-list {
      margin-top: 14px;
      background: #f7fbff;
      border: 1px solid #d8e8f7;
      border-radius: 12px;
      padding: 10px 12px;
    }

    details.clue-list summary {
      cursor: pointer;
      font-weight: 700;
    }

    .clue-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 10px;
    }

    .clue-columns ul {
      margin: 0;
      padding-left: 18px;
      font-size: 0.88rem;
      line-height: 1.42;
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--primary-dark);
      padding: 8px 12px;
      font-size: 0.83rem;
      font-weight: 700;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 40;
    }

    .modal {
      width: min(720px, 100%);
      background: white;
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px;
      max-height: 90vh;
      overflow: auto;
    }

    .modal h2 {
      margin: 0 0 10px;
    }

    .modal p {
      line-height: 1.5;
    }

    .result-box {
      margin: 14px 0;
      padding: 14px;
      background: #f6fbf8;
      border: 1px solid #d9eee2;
      border-radius: 14px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .result-item {
      background: white;
      border-radius: 12px;
      padding: 10px 12px;
      border: 1px solid #e5edf3;
    }

    .result-item span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 2px;
    }

    .code-box {
      margin-top: 12px;
      padding: 14px;
      border-radius: 14px;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .code-box small {
      display: block;
      letter-spacing: .04em;
      color: #b6c5d8;
      margin-bottom: 6px;
      text-transform: uppercase;
      font-size: 0.76rem;
    }

    .code-box strong {
      display: block;
      font-size: 1.25rem;
      letter-spacing: 0.06em;
      word-break: break-word;
    }

    .small-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%) translateY(140%);
      background: #0f172a;
      color: white;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      box-shadow: var(--shadow);
      z-index: 60;
      transition: .25s ease;
      opacity: 0;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.success { background: #146a45; }
    .toast.error { background: #b42318; }

    @media (max-width: 760px) {
      .top-bar {
        grid-template-columns: auto 1fr;
      }

      .timer-box,
      #pauseBtn {
        grid-column: span 1;
      }

      .student-grid,
      .result-grid,
      .clue-columns {
        grid-template-columns: 1fr;
      }

      .title-wrap h1 {
        font-size: 1rem;
      }

      .grid-card,
      .student-card,
      .clue-card {
        padding-left: 10px;
        padding-right: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top-bar">
      <button class="btn btn-light" id="menuBtn">Menu</button>
      <div class="title-wrap">
        <h1>Cruzadinha Bio A</h1>
        
      </div>
      <div class="timer-box">
        <span class="timer-label">Tempo</span>
        <div id="timer">00:00</div>
      </div>
      <button class="btn btn-warning" id="pauseBtn">Pausar</button>
    </div>

    
    <section class="student-card">
      <div class="student-grid">
        <div class="field">
          <label for="alunoNome">Nome completo do aluno</label>
          <input id="alunoNome" type="text" placeholder="Digite o nome completo do aluno">
        </div>
        <div class="field">
          <label for="alunoTurma">Turma</label>
          <select id="alunoTurma">
            <option value="">Selecione</option>
          </select>
        </div>
      </div>
    </section>


    
    <section class="two-col">
      <article class="clue-card">
        <h2>Dica atual</h2>
        <p id="clueText">Toque em uma célula numerada para começar.</p>
        <div class="meta-row">
          <span><strong>Direção:</strong> <span id="directionLabel">—</span></span>
          <span><strong>Completas:</strong> <span id="filledWords">0</span>/<span id="totalWords">0</span></span>
        </div>
      </article>
    </section>

    <section class="grid-card">

      <div class="grid-wrapper">
        <div id="grid" class="crossword-grid"></div>
      </div>

      <details class="clue-list">
        <summary>Ver todas as dicas</summary>
        <div class="clue-columns">
          <div>
            <strong>Horizontais</strong>
            <ul id="cluesHorizontal"></ul>
          </div>
          <div>
            <strong>Verticais</strong>
            <ul id="cluesVertical"></ul>
          </div>
        </div>
      </details>

      <div class="action-row">
        <button class="btn btn-primary" id="submitBtn">Finalizar atividade</button>
        <button class="btn btn-light" id="recoverBtn" type="button">Recuperar último estado</button>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" id="menuModal">
    <div class="modal">
      <h2>Menu</h2>
      <p>Use este menu se precisar pausar, recomeçar ou limpar os dados deste navegador.</p>
      <div class="modal-actions">
        <button class="btn btn-warning" id="pauseFromMenuBtn">Pausar / Retomar</button>
        <button class="btn btn-secondary" id="restartBtn">Recomeçar atividade</button>
        <button class="btn btn-danger" id="clearSavedBtn">Limpar dados salvos</button>
        <button class="btn btn-light" id="closeMenuBtn">Fechar</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal">
    <div class="modal" id="modalContent"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const FORM_ENTREGA_URL = 'https://forms.gle/utCi9PLvVdcvHhJQ7';
    const STORAGE_KEY = 'superbio_cruzadinha_artropodes_v2';
    const TURMAS = ['2º A', '2º B', '2º C', '2º D'];

    const questions = [
      { id: 1, dir: 'H', r: 1, c: 4, word: 'TRAQUEIA', clue: '1 Horizontal — Tubo respiratório presente em muitos insetos.' },
      { id: 2, dir: 'V', r: 1, c: 11, word: 'ANTENAS', clue: '2 Vertical — Estruturas sensoriais localizadas na cabeça dos insetos.' },
      { id: 3, dir: 'V', r: 2, c: 1, word: 'ARTROPODES', clue: '3 Vertical — Grupo de invertebrados com patas articuladas e exoesqueleto.' },
      { id: 4, dir: 'V', r: 3, c: 7, word: 'HEXAPODE', clue: '4 Vertical — Animal com seis patas, como os insetos.' },
      { id: 5, dir: 'H', r: 4, c: 4, word: 'CABECA', clue: '5 Horizontal — Região do corpo onde ficam olhos, boca e antenas.' },
      { id: 6, dir: 'V', r: 6, c: 3, word: 'QUITINA', clue: '6 Vertical — Substância que compõe o exoesqueleto dos artrópodes.' },
      { id: 7, dir: 'H', r: 7, c: 7, word: 'PATAS', clue: '7 Horizontal — Apêndices articulados usados na locomoção.' },
      { id: 8, dir: 'V', r: 7, c: 9, word: 'TORAX', clue: '8 Vertical — Parte do corpo do inseto onde se prendem pernas e asas.' },
      { id: 9, dir: 'H', r: 8, c: 1, word: 'OVIPARO', clue: '9 Horizontal — Animal que se reproduz por ovos.' },
      { id: 10, dir: 'H', r: 12, c: 3, word: 'ABDOME', clue: '10 Horizontal — Região posterior do corpo dos insetos.' }
    ];

    let maxR = 0;
    let maxC = 0;
    let gridMap = {};
    let activeWordIndex = -1;
    let activeCellKey = null;
    let isVertical = false;
    let timeSeconds = 0;
    let timerInterval = null;
    let isPaused = false;
    let hasStarted = false;
    let finalizedResult = null;
    let wordStates = {};
    let toastTimer = null;

    function normalizeText(text) {
      return (text || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^A-Za-z0-9 ]/g, '')
        .replace(/\s+/g, ' ')
        .trim()
        .toUpperCase();
    }

    function normalizeWord(text) {
      return normalizeText(text).replace(/\s+/g, '');
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function compactTime(seconds) {
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      return `${m}${s}`;
    }

    function slugTurma(turma) {
      return (turma || '')
        .replace(/º/g, '')
        .replace(/\s+/g, '')
        .toUpperCase();
    }

    function showToast(message, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.remove('success', 'error');
      if (type) toast.classList.add(type);
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show', 'success', 'error');
      }, 1800);
    }

    function feedbackToast(text, type = 'success') {
      showToast(text, type);
    }

    function initTurmas() {
      const select = document.getElementById('alunoTurma');
      TURMAS.forEach(turma => {
        const opt = document.createElement('option');
        opt.value = turma;
        opt.textContent = turma;
        select.appendChild(opt);
      });
    }

    function renderClueLists() {
      const ulH = document.getElementById('cluesHorizontal');
      const ulV = document.getElementById('cluesVertical');
      ulH.innerHTML = '';
      ulV.innerHTML = '';

      questions.forEach(q => {
        const li = document.createElement('li');
        li.textContent = q.clue;
        if (q.dir === 'H') ulH.appendChild(li);
        else ulV.appendChild(li);
      });
    }

    function initGrid() {
      maxR = 0;
      maxC = 0;
      gridMap = {};
      activeWordIndex = -1;
      activeCellKey = null;
      isVertical = false;
      wordStates = {};

      questions.forEach((q, index) => {
        for (let i = 0; i < q.word.length; i++) {
          const r = q.dir === 'H' ? q.r : q.r + i;
          const c = q.dir === 'H' ? q.c + i : q.c;
          maxR = Math.max(maxR, r);
          maxC = Math.max(maxC, c);
          const cellKey = `${r}_${c}`;
          if (!gridMap[cellKey]) {
            gridMap[cellKey] = { answer: q.word[i], words: [], number: null };
          }
          gridMap[cellKey].words.push({ qIndex: index, dir: q.dir, charIndex: i });
          if (i === 0) {
            if (gridMap[cellKey].number == null || q.id < gridMap[cellKey].number) {
              gridMap[cellKey].number = q.id;
            }
          }
        }
      });

      const gridEl = document.getElementById('grid');
      gridEl.innerHTML = '';
      gridEl.style.gridTemplateColumns = `repeat(${maxC + 1}, var(--cell-size))`;
      gridEl.style.gridTemplateRows = `repeat(${maxR + 1}, var(--cell-size))`;

      for (let r = 0; r <= maxR; r++) {
        for (let c = 0; c <= maxC; c++) {
          const cellKey = `${r}_${c}`;
          const container = document.createElement('div');
          container.className = 'cell-container';

          if (gridMap[cellKey]) {
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'cell-input';
            input.maxLength = 1;
            input.id = `cell_${r}_${c}`;
            input.dataset.r = r;
            input.dataset.c = c;
            input.setAttribute('autocomplete', 'off');
            input.setAttribute('autocorrect', 'off');
            input.setAttribute('autocapitalize', 'characters');
            input.setAttribute('spellcheck', 'false');

            input.addEventListener('focus', () => handleFocus(r, c));
            input.addEventListener('input', (e) => handleInput(e, r, c));
            input.addEventListener('keydown', (e) => handleKeydown(e, r, c));

            if (gridMap[cellKey].number != null) {
              const num = document.createElement('span');
              num.className = 'cell-number';
              num.textContent = gridMap[cellKey].number;
              container.appendChild(num);
            }
            container.appendChild(input);
          } else {
            const black = document.createElement('div');
            black.className = 'cell-input black';
            container.appendChild(black);
          }
          gridEl.appendChild(container);
        }
      }

      document.getElementById('totalWords').textContent = questions.length;
      renderClueLists();
      updateProgress();
    }

    function updateCellSize() {
      const appWidth = Math.min(window.innerWidth, 820) - 44;
      const ideal = Math.floor(appWidth / maxC) - 1;
      const size = Math.max(26, Math.min(42, ideal));
      document.documentElement.style.setProperty('--cell-size', `${size}px`);
    }

    function startTimer() {
      if (finalizedResult || timerInterval) return;
      hasStarted = true;
      timerInterval = setInterval(() => {
        if (!isPaused && !finalizedResult) {
          timeSeconds += 1;
          document.getElementById('timer').textContent = formatTime(timeSeconds);
          saveState();
        }
      }, 1000);
    }

    function handleFocus(r, c) {
      if (isPaused || finalizedResult) return;
      startTimer();
      const cellKey = `${r}_${c}`;
      const cellData = gridMap[cellKey];
      if (!cellData) return;

      if (activeCellKey === cellKey && cellData.words.length > 1) {
        isVertical = !isVertical;
      } else {
        activeCellKey = cellKey;
        let wordMatch = cellData.words.find(w => (w.dir === 'V') === isVertical);
        if (!wordMatch) {
          wordMatch = cellData.words[0];
          isVertical = wordMatch.dir === 'V';
        }
      }

      const wordObj = cellData.words.find(w => (w.dir === 'V') === isVertical) || cellData.words[0];
      activeWordIndex = wordObj.qIndex;
      isVertical = wordObj.dir === 'V';
      updateHighlights();
    }

    function updateHighlights() {
      document.querySelectorAll('.cell-input').forEach(el => {
        el.classList.remove('highlight-word', 'highlight-cell');
      });

      if (activeWordIndex < 0) return;
      const q = questions[activeWordIndex];
      document.getElementById('clueText').textContent = q.clue;
      document.getElementById('directionLabel').textContent = q.dir === 'H' ? 'Horizontal' : 'Vertical';

      for (let i = 0; i < q.word.length; i++) {
        const r = q.dir === 'H' ? q.r : q.r + i;
        const c = q.dir === 'H' ? q.c + i : q.c;
        const el = document.getElementById(`cell_${r}_${c}`);
        if (el) el.classList.add('highlight-word');
      }

      const activeEl = document.getElementById(`cell_${activeCellKey}`);
      if (activeEl) activeEl.classList.add('highlight-cell');
    }

    function getCellValue(r, c) {
      const el = document.getElementById(`cell_${r}_${c}`);
      return el ? normalizeWord(el.value) : '';
    }

    function handleInput(e, r, c) {
      if (isPaused || finalizedResult) return;
      const val = normalizeWord(e.target.value).slice(0, 1);
      e.target.value = val;
      updateProgress();
      updateWordFeedbackForCell(r, c);
      saveState();
      if (val) moveFocusSmart(r, c, 1);
    }

    function handleKeydown(e, r, c) {
      if (finalizedResult) return;

      if (e.key === 'Backspace') {
        if (e.target.value) {
          e.target.value = '';
          updateProgress();
          updateWordFeedbackForCell(r, c);
          saveState();
        } else {
          e.preventDefault();
          moveFocusSmart(r, c, -1, true);
        }
        return;
      }

      if (e.key === 'ArrowRight') { e.preventDefault(); focusCell(r, c + 1); return; }
      if (e.key === 'ArrowLeft') { e.preventDefault(); focusCell(r, c - 1); return; }
      if (e.key === 'ArrowDown') { e.preventDefault(); focusCell(r + 1, c); return; }
      if (e.key === 'ArrowUp') { e.preventDefault(); focusCell(r - 1, c); return; }
      if (e.key === 'Enter') {
        e.preventDefault();
        if (gridMap[`${r}_${c}`]?.words.length > 1) {
          isVertical = !isVertical;
          handleFocus(r, c);
        }
      }
    }

    function focusCell(r, c) {
      const el = document.getElementById(`cell_${r}_${c}`);
      if (el) el.focus();
    }

    function moveFocusSmart(r, c, step, clearPrevious = false) {
      if (activeWordIndex < 0) return;
      const q = questions[activeWordIndex];
      const cellData = gridMap[`${r}_${c}`];
      if (!cellData) return;
      const wordObj = cellData.words.find(w => w.qIndex === activeWordIndex);
      if (!wordObj) return;

      if (step < 0) {
        const prevIndex = Math.max(0, wordObj.charIndex - 1);
        const prevR = q.dir === 'H' ? q.r : q.r + prevIndex;
        const prevC = q.dir === 'H' ? q.c + prevIndex : q.c;
        const prevEl = document.getElementById(`cell_${prevR}_${prevC}`);
        if (prevEl) {
          prevEl.focus();
          if (clearPrevious) {
            prevEl.value = '';
            updateProgress();
            updateWordFeedbackForCell(prevR, prevC);
            saveState();
          }
        }
        return;
      }

      for (let nextIndex = wordObj.charIndex + 1; nextIndex < q.word.length; nextIndex++) {
        const nextR = q.dir === 'H' ? q.r : q.r + nextIndex;
        const nextC = q.dir === 'H' ? q.c + nextIndex : q.c;
        const nextEl = document.getElementById(`cell_${nextR}_${nextC}`);
        if (!nextEl) continue;
        if (normalizeWord(nextEl.value)) continue;
        nextEl.focus();
        return;
      }
    }

    function getUserWord(q) {
      let userWord = '';
      for (let i = 0; i < q.word.length; i++) {
        const r = q.dir === 'H' ? q.r : q.r + i;
        const c = q.dir === 'H' ? q.c + i : q.c;
        const val = getCellValue(r, c);
        userWord += val || '_';
      }
      return userWord;
    }

    function getWordState(q) {
      const userWord = getUserWord(q);
      if (userWord.includes('_')) return 'incomplete';
      return normalizeWord(userWord) === normalizeWord(q.word) ? 'correct' : 'incorrect';
    }

    function updateWordFeedbackForCell(r, c) {
      const cellData = gridMap[`${r}_${c}`];
      if (!cellData) return;
      let heardCorrect = false;
      let heardIncorrect = false;

      cellData.words.forEach(({ qIndex }) => {
        const q = questions[qIndex];
        const newState = getWordState(q);
        const oldState = wordStates[q.id] || 'incomplete';
        if (newState !== oldState) {
          wordStates[q.id] = newState;
          if (newState === 'correct') heardCorrect = true;
          if (newState === 'incorrect') heardIncorrect = true;
        }
      });

      if (heardIncorrect) feedbackToast('Oh no!', 'error');
      else if (heardCorrect) feedbackToast('Oh Yes!', 'success');
    }

    function updateProgress() {
      let filled = 0;
      questions.forEach(q => {
        const userWord = getUserWord(q);
        if (!userWord.includes('_') && userWord.length === q.word.length) filled += 1;
      });
      document.getElementById('filledWords').textContent = filled;
    }

    function setInputsDisabled(disabled) {
      document.querySelectorAll('.cell-input').forEach(el => {
        if (!el.classList.contains('black')) el.disabled = disabled;
      });
    }

    function togglePauseState() {
      if (finalizedResult) return;
      isPaused = !isPaused;
      if (!isPaused && hasStarted && !timerInterval) startTimer();
      setInputsDisabled(isPaused);
      const btn = document.getElementById('pauseBtn');
      btn.textContent = isPaused ? 'Retomar' : 'Pausar';
      saveState();
    }

    function openMenu() {
      document.getElementById('menuModal').style.display = 'flex';
    }

    function closeMenu() {
      document.getElementById('menuModal').style.display = 'none';
    }

    function resetRuntime(clearStateToo = false) {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = null;
      timeSeconds = 0;
      hasStarted = false;
      isPaused = false;
      finalizedResult = null;
      activeWordIndex = -1;
      activeCellKey = null;
      wordStates = {};
      document.getElementById('timer').textContent = '00:00';
      document.getElementById('clueText').textContent = 'Toque em uma célula numerada para começar.';
      document.getElementById('directionLabel').textContent = '—';
      document.getElementById('filledWords').textContent = '0';
      document.getElementById('pauseBtn').textContent = 'Pausar';
      setInputsDisabled(false);
      document.querySelectorAll('.cell-input').forEach(el => {
        if (!el.classList.contains('black')) {
          el.value = '';
          el.classList.remove('highlight-word', 'highlight-cell');
        }
      });
      if (clearStateToo) clearSavedState();
    }

    function restartActivity() {
      const ok = confirm('Deseja realmente apagar as respostas e recomeçar?');
      if (!ok) return;
      resetRuntime(true);
      saveStudentFields();
      saveState();
      closeMenu();
      showToast('Atividade reiniciada.');
    }

    function clearSavedState() {
      localStorage.removeItem(STORAGE_KEY);
    }

    function saveStudentFields() {
      // helper: os campos entram no saveState
    }

    function collectCellValues() {
      const values = {};
      Object.keys(gridMap).forEach(key => {
        const el = document.getElementById(`cell_${key}`);
        if (el && el.value) values[key] = normalizeWord(el.value).slice(0, 1);
      });
      return values;
    }

    function saveState() {
      const payload = {
        nome: document.getElementById('alunoNome').value,
        turma: document.getElementById('alunoTurma').value,
        cells: collectCellValues(),
        timeSeconds,
        hasStarted,
        isPaused,
        finalizedResult,
        savedAt: new Date().toISOString()
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    }

    function restoreFromState(showFeedback = true) {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        if (showFeedback) showToast('Não há estado salvo neste navegador.');
        return false;
      }

      try {
        const state = JSON.parse(raw);
        resetRuntime(false);

        document.getElementById('alunoNome').value = state.nome || '';
        document.getElementById('alunoTurma').value = state.turma || '';

        Object.entries(state.cells || {}).forEach(([key, value]) => {
          const el = document.getElementById(`cell_${key}`);
          if (el) el.value = normalizeWord(value).slice(0, 1);
        });

        timeSeconds = Number(state.timeSeconds || 0);
        hasStarted = Boolean(state.hasStarted);
        isPaused = Boolean(state.isPaused);
        finalizedResult = state.finalizedResult || null;
        document.getElementById('timer').textContent = formatTime(timeSeconds);
        updateProgress();
        questions.forEach(q => { wordStates[q.id] = getWordState(q); });
        setInputsDisabled(isPaused || Boolean(finalizedResult));
        document.getElementById('pauseBtn').textContent = isPaused ? 'Retomar' : 'Pausar';

        if (hasStarted && !finalizedResult) {
          startTimer();
          if (isPaused) {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = null;
          }
        }

        if (finalizedResult) {
          renderFinalScreen(finalizedResult);
        }

        if (showFeedback) {
          const msg = finalizedResult ? 'Atividade concluída recuperada com sucesso.' : 'Progresso recuperado com sucesso.';
          showToast(msg);
        }
        return true;
      } catch (error) {
        console.error(error);
        if (showFeedback) showToast('Não foi possível recuperar os dados salvos.');
        return false;
      }
    }

    function bindAutosaveFields() {
      ['alunoNome', 'alunoTurma'].forEach(id => {
        document.getElementById(id).addEventListener('input', saveState);
        document.getElementById(id).addEventListener('change', saveState);
      });
    }

    function buildResultData() {
      const nome = document.getElementById('alunoNome').value.trim();
      const turma = document.getElementById('alunoTurma').value;
      let acertos = 0;
      const detalhes = [];

      questions.forEach(q => {
        const userWord = getUserWord(q);
        const correta = normalizeWord(userWord) === normalizeWord(q.word);
        if (correta) acertos += 1;
        detalhes.push(`${q.id} ${q.dir === 'H' ? 'Horizontal' : 'Vertical'} — ${correta ? 'ACERTOU' : 'ERROU'} — digitou: ${userWord} — correta: ${q.word}`);
      });

      const total = questions.length;
      const percentual = Math.round((acertos / total) * 100);
      const code = generateVerificationCode({ nome, turma, acertos, total, timeSeconds, percentual });

      return {
        nome,
        turma,
        acertos,
        total,
        percentual,
        tempo: formatTime(timeSeconds),
        segundos: timeSeconds,
        dataHora: new Date().toLocaleString('pt-BR'),
        detalhes,
        code
      };
    }

    function generateVerificationCode({ nome, turma, acertos, total, timeSeconds, percentual }) {
      const turmaSlug = slugTurma(turma || 'SEM');
      const namePayload = normalizeWord(nome || 'SEMNOME');
      const scorePayload = `${acertos}${total}`.padStart(4, '0');
      const percentPayload = String(percentual).padStart(3, '0');
      const timePayload = compactTime(timeSeconds);
      const base = `${turmaSlug}|${namePayload}|${scorePayload}|${percentPayload}|${timePayload}`;
      let checksum = 0;
      for (let i = 0; i < base.length; i++) {
        checksum = (checksum * 131 + base.charCodeAt(i) * (i + 3)) % 1296;
      }
      const dv = checksum.toString(36).toUpperCase().padStart(2, '0');
      return `SB-${turmaSlug}-N${percentPayload}-T${timePayload}-${dv}`;
    }

    function openForm() {
      window.open(FORM_ENTREGA_URL, '_blank', 'noopener');
    }

    async function copyCode(code) {
      try {
        await navigator.clipboard.writeText(code);
        showToast('Código copiado.');
      } catch (_) {
        showToast('Não foi possível copiar automaticamente.');
      }
    }

    function renderFinalScreen(result) {
      finalizedResult = result;
      saveState();
      setInputsDisabled(true);
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = null;
      isPaused = true;
      document.getElementById('pauseBtn').textContent = 'Retomar';

      document.getElementById('modalContent').innerHTML = `
        <h2>Atividade concluída com sucesso</h2>
        <p>Confira os dados abaixo, copie o código de confirmação e envie no formulário da atividade.</p>
        <div class="result-box">
          <div class="result-grid">
            <div class="result-item"><span>Turma</span><strong>${result.turma}</strong></div>
            <div class="result-item"><span>Nome</span><strong>${result.nome}</strong></div>
            <div class="result-item"><span>Pontuação</span><strong>${result.acertos}/${result.total} (${result.percentual}%)</strong></div>
            <div class="result-item"><span>Tempo</span><strong>${result.tempo}</strong></div>
            <div class="result-item"><span>Data</span><strong>${result.dataHora}</strong></div>
          </div>
          <div class="code-box">
            <small>Código de confirmação</small>
            <strong>${result.code}</strong>
          </div>
          <p class="small-note">Não feche esta página antes de copiar o código e guardar um print da tela final.</p>
        </div>
        <div class="modal-actions">
          <button class="btn btn-primary" id="copyCodeBtn">Copiar código</button>
          <button class="btn btn-secondary" id="openFormBtn">Abrir formulário de entrega</button>
          <button class="btn btn-light" id="closeModalBtn">Fechar</button>
          <button class="btn btn-danger" id="releaseDeviceBtn">Entrega confirmada / liberar aparelho</button>
        </div>
      `;

      document.getElementById('modal').style.display = 'flex';
      document.getElementById('copyCodeBtn').onclick = () => copyCode(result.code);
      document.getElementById('openFormBtn').onclick = openForm;
      document.getElementById('closeModalBtn').onclick = () => { document.getElementById('modal').style.display = 'none'; };
      document.getElementById('releaseDeviceBtn').onclick = () => {
        const ok = confirm('Isso vai limpar o código e o progresso salvos neste navegador. Deseja continuar?');
        if (!ok) return;
        clearSavedState();
        location.reload();
      };
    }

    function validateStudentData() {
      const nome = document.getElementById('alunoNome').value.trim();
      const turma = document.getElementById('alunoTurma').value;
      if (!nome || !turma) {
        alert('Preencha nome completo do aluno e turma antes de finalizar.');
        return false;
      }
      return true;
    }

    function finalizeActivity() {
      if (!validateStudentData()) return;
      const filledWords = Number(document.getElementById('filledWords').textContent || '0');
      if (filledWords < questions.length) {
        const ok = confirm('Ainda há palavras incompletas ou erradas. Deseja finalizar mesmo assim?');
        if (!ok) return;
      }
      const result = buildResultData();
      renderFinalScreen(result);
    }

    function closeModalIfBackdrop(event, id) {
      if (event.target.id === id) document.getElementById(id).style.display = 'none';
    }

    function boot() {
      initTurmas();
      initGrid();
      updateCellSize();
      bindAutosaveFields();

      document.getElementById('pauseBtn').addEventListener('click', togglePauseState);
      document.getElementById('submitBtn').addEventListener('click', finalizeActivity);
      document.getElementById('recoverBtn').addEventListener('click', () => restoreFromState(true));
      document.getElementById('menuBtn').addEventListener('click', openMenu);
      document.getElementById('closeMenuBtn').addEventListener('click', closeMenu);
      document.getElementById('pauseFromMenuBtn').addEventListener('click', () => {
        togglePauseState();
        closeMenu();
      });
      document.getElementById('restartBtn').addEventListener('click', restartActivity);
      document.getElementById('clearSavedBtn').addEventListener('click', () => {
        const ok = confirm('Deseja limpar todos os dados salvos deste navegador?');
        if (!ok) return;
        clearSavedState();
        showToast('Dados locais removidos.');
        closeMenu();
      });

      document.getElementById('menuModal').addEventListener('click', (e) => closeModalIfBackdrop(e, 'menuModal'));
      document.getElementById('modal').addEventListener('click', (e) => closeModalIfBackdrop(e, 'modal'));
      window.addEventListener('resize', updateCellSize);

      const recovered = restoreFromState(false);
      if (!recovered) saveState();
      else showToast(finalizedResult ? 'Código final recuperado.' : 'Progresso recuperado.');
    }

    window.addEventListener('load', boot);
  </script>
</body>
</html>
